name: Quality Gates

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test (API integration)
        run: npm test -- --passWithNoTests

      - name: Build
        run: npm run build

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Test (E2E)
        run: npm run e2e -- --reporter=github

  worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install worker deps and pytest
        run: |
          python -m pip install --upgrade pip
          pip install -r worker/requirements.txt
          pip install pytest

      - name: Worker syntax check
        run: python -m compileall worker/app

      - name: Worker pipeline tests
        run: python -m pytest tests/unit/test_worker_pipeline.py
